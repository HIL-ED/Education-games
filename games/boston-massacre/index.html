  </div>
  <div class="board-section board-stats">
    <div class="stat"><span class="stat-num">${evidenceConfirmedCount()}/${DATA.evidence.length}</span><span class="stat-label">Evidence collected</span></div>
    <div class="stat"><span class="stat-num">${esc(reliabilityAverageLabel())}</span><span class="stat-label">Reliability average</span></div>
    <div class="stat"><span class="stat-num">${biasFlagCount()}</span><span class="stat-label">Bias flags raised</span></div>
    <div class="stat"><span class="stat-num">${state.timeline.solved ? 'Complete' : 'Incomplete'}</span><span class="stat-label">Timeline</span></div>
  </div>
  <div class="board-section">
    <button type="button" class="btn secondary small full" data-action="open-notebook">📓 Open Detective Notebook</button>
  </div>`;
}

function renderNotebookModal(){
  const withNotes = DATA.evidence.filter(e => (state.evidence[e.id].notesA || '').trim() || (state.evidence[e.id].notesB || '').trim());
  return `<div class="modal-backdrop" data-action="close-notebook">
    <div class="modal-panel" data-action="noop">
      <div class="teacher-head"><h2>📓 Detective Notebook</h2><button type="button" class="btn secondary small" data-action="close-notebook">Close</button></div>
      ${withNotes.length ? withNotes.map(e => `<div class="report-note"><strong>${esc(e.title)}</strong><p>${esc(state.evidence[e.id].notesA)}</p><p>${esc(state.evidence[e.id].notesB)}</p></div>`).join('') : '<p class="hint">No notes yet — write your thoughts as you investigate each exhibit.</p>'}
    </div>
  </div>`;
}
/* ---------------------------------------------------------------
   10. MAIN RENDER LOOP
   --------------------------------------------------------------- */
function currentEvidenceRec(){ return state.evidence[state.currentEvidence]; }

function showBoard(screenId){ return screenId !== 'intro'; }

function screenHTML(id){
  switch (id) {
    case 'intro': return renderIntro();
    case 'context': return renderContext();
    case 'suspects': return renderSuspects();
    case 'evidence': return renderEvidenceScreen();
    case 'comparison': return renderComparisonScreen();
    case 'timeline': return renderTimelineScreen();
    case 'matrix': return renderMatrixScreen();
    case 'argument': return renderArgumentScreen();
    case 'historians': return renderHistoriansScreen();
    case 'reflection': return renderReflectionScreen();
    case 'report': return renderReportScreen();
    default: return renderIntro();
  }
}

function render(){
  document.documentElement.className = 'fs-' + state.fontSize;
  const strip = document.getElementById('tabStrip');
  strip.innerHTML = TABS.map(t => {
    const locked = unlockInfo(t.id);
    return `<button type="button" role="tab" aria-selected="${state.screen === t.id}" class="${state.screen === t.id ? 'active' : ''}" data-action="nav" data-screen="${t.id}" title="${locked ? esc(locked) : ''}">${t.icon} ${t.label}${locked ? ' 🔒' : ''}</button>`;
  }).join('');

  document.getElementById('progressLabel').textContent = `Progress: ${completedSteps()}/${TOTAL_STEPS} steps`;
  document.getElementById('progressFill').style.width = progressPct() + '%';
  document.getElementById('progressTime').textContent = `~${estRemainingMinutes()} min remaining`;

  document.getElementById('screenRoot').innerHTML = screenHTML(state.screen);

  const board = document.getElementById('board');
  const mainGrid = document.getElementById('mainGrid');
  if (showBoard(state.screen)) {
    board.hidden = false; board.innerHTML = renderBoard();
    mainGrid.classList.remove('no-board');
  } else {
    board.hidden = true; board.innerHTML = '';
    mainGrid.classList.add('no-board');
  }

  document.getElementById('overlays').innerHTML =
    (ui.teacherOpen ? renderTeacherPanel() : '') +
    (ui.notebookOpen ? renderNotebookModal() : '');
}

function goTo(screenId){
  state.screen = screenId;
  if (screenId === 'evidence') state.currentEvidence = null;
  if (screenId === 'historians') state.historiansViewed = true;
  resetUi();
  saveState();
  render();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

/* ---------------------------------------------------------------
   11. ACTIONS
   --------------------------------------------------------------- */
function confirmEvidence(){
  const e = evidenceById(state.currentEvidence);
  const rec = currentEvidenceRec();
  if (!rec.reliability || !rec.suspects.length) return;
  rec.suspects.forEach(sid => {
    if (typeof rec.sliders[sid] !== 'number') {
      rec.sliders[sid] = (e.suggested[sid] != null) ? e.suggested[sid] : 10;
    }
  });
  Object.keys(rec.sliders).forEach(sid => { if (rec.suspects.indexOf(sid) === -1) delete rec.sliders[sid]; });
  rec.confirmed = true;
  saveState();
  render();
  toast('Findings logged to the Investigation Board.');
}

function restartInvestigation(){
  if (!confirm('This erases all saved progress and starts a brand-new investigation. Continue?')) return;
  try { localStorage.removeItem(STORAGE_KEY); } catch (err) { /* ignore */ }
  state = defaultState();
  resetUi();
  render();
  window.scrollTo({ top: 0 });
  toast('Investigation restarted.');
}

function teacherReset(){
  if (!confirm("This erases this device's saved student progress. Continue?")) return;
  try { localStorage.removeItem(STORAGE_KEY); } catch (err) { /* ignore */ }
  state = defaultState();
  render();
  toast('Student data reset.');
}

let toastTimer = null;
function toast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2400);
}

let saveTimer = null;
function debouncedSave(){
  clearTimeout(saveTimer);
  saveTimer = setTimeout(saveState, 350);
}

/* ---------------------------------------------------------------
   12. PRINT + COPY
   --------------------------------------------------------------- */
function buildReportPrintHTML(){
  const arg = state.argument;
  const primarySuspect = arg.primary ? suspectById(arg.primary) : null;
  const confLabel = { very: 'Very confident', somewhat: 'Somewhat confident', unsure: 'Still not sure' }[arg.confidence] || '(not set)';
  let html = `<h1>Who Was Responsible for the Boston Massacre?</h1><h2>Completion Report</h2>`;
  html += `<h3>Responsibility Graph</h3><ul>` + DATA.suspects.map(s => `<li>${esc(s.name)}: ${suspectTotal(s.id)}%</li>`).join('') + `</ul>`;
  html += `<h3>My Verdict</h3><p>Primary responsibility: <strong>${primarySuspect ? esc(primarySuspect.name) : '(not chosen)'}</strong></p>`;
  html += `<p>Confidence: ${esc(confLabel)}</p>`;
  html += `<h4>Strongest evidence</h4><ul>` + arg.strongest.filter(s => s.evidenceId).map(s => `<li>${esc((evidenceById(s.evidenceId) || {}).title || '')}: ${esc(s.reason)}</li>`).join('') + `</ul>`;
  html += `<h4>Contradictory evidence</h4><p>${arg.contradictoryId ? esc((evidenceById(arg.contradictoryId) || {}).title || '') + ': ' + esc(arg.contradictoryReason) : '(none)'}</p>`;
  html += `<h3>Evidence Log</h3>`;
  DATA.evidence.forEach(e => {
    const rec = state.evidence[e.id];
    if (rec.confirmed) {
      html += `<p><strong>${esc(e.title)}</strong> — ${esc(reliabilityLabel(rec.reliability))}<br>${esc(rec.notesA)}<br>${esc(rec.notesB)}</p>`;
    }
  });
  html += `<h3>Reflection</h3>`;
  DATA.reflectionPrompts.forEach(p => {
    html += `<p><strong>${esc(p.text)}</strong><br>${esc(state.reflection[p.id])}</p>`;
  });
  return html;
}

function buildBlankPacketHTML(){
  let html = `<h1>Who Was Responsible for the Boston Massacre?</h1><h2>Investigation Packet</h2>`;
  html += `<p>Name: _______________________&nbsp;&nbsp;&nbsp; Class: ____________&nbsp;&nbsp;&nbsp; Date: ____________</p>`;
  html += `<h3>Suspects</h3><ul>` + DATA.suspects.map(s => `<li><strong>${esc(s.name)}</strong> — ${esc(s.role)}</li>`).join('') + `</ul>`;
  DATA.evidence.forEach(e => {
    html += `<div class="packet-ex"><h3>Exhibit ${e.num}: ${esc(e.title)}</h3><p>${esc(e.background)}</p>`;
    html += `<p><em>${esc(e.source.label)}${e.source.isParaphrase ? ' (paraphrase)' : ''}:</em> “${esc(e.source.text)}”</p>`;
    html += `<p>Reliability (circle one): Very reliable&nbsp;&nbsp;/&nbsp;&nbsp;Somewhat reliable&nbsp;&nbsp;/&nbsp;&nbsp;Questionable&nbsp;&nbsp;/&nbsp;&nbsp;Highly biased</p>`;
    html += `<p>Who does this increase responsibility for? _______________________________________________</p>`;
    html += `<p>${esc(e.notebook.suggests)}</p><p>_______________________________________________</p>`;
    html += `<p>${esc(e.notebook.questions)}</p><p>_______________________________________________</p></div>`;
  });
  html += `<h3>Final Argument</h3><p>Who bears the greatest responsibility for the Boston Massacre, and why? Cite at least three pieces of evidence and one piece of contradictory evidence.</p>`;
  html += `<p>_______________________________________________</p><p>_______________________________________________</p><p>_______________________________________________</p>`;
  return html;
}

function printReport(){
  document.getElementById('printArea').innerHTML = buildReportPrintHTML();
  window.print();
}
function printBlankPacket(){
  document.getElementById('printArea').innerHTML = buildBlankPacketHTML();
  window.print();
}

function buildReportPlainText(){
  const arg = state.argument;
  const primarySuspect = arg.primary ? suspectById(arg.primary) : null;
  const confLabel = { very: 'Very confident', somewhat: 'Somewhat confident', unsure: 'Still not sure' }[arg.confidence] || '(not set)';
  let text = 'WHO WAS RESPONSIBLE FOR THE BOSTON MASSACRE? — Completion Report\n\n';
  text += 'Responsibility Graph:\n' + DATA.suspects.map(s => `  ${s.name}: ${suspectTotal(s.id)}%`).join('\n') + '\n\n';
  text += `Verdict: ${primarySuspect ? primarySuspect.name : '(not chosen)'}\n`;
  text += `Confidence: ${confLabel}\n\n`;
  text += 'Strongest evidence:\n' + arg.strongest.filter(s => s.evidenceId).map(s => `  - ${(evidenceById(s.evidenceId) || {}).title}: ${s.reason}`).join('\n') + '\n\n';
  text += `Contradictory evidence: ${arg.contradictoryId ? (evidenceById(arg.contradictoryId) || {}).title + ': ' + arg.contradictoryReason : '(none)'}\n\n`;
  text += 'Reflection:\n' + DATA.reflectionPrompts.map(p => `  ${p.text}\n  ${state.reflection[p.id] || ''}`).join('\n\n');
  return text;
}

function copyReport(){
  const text = buildReportPlainText();
  const done = () => toast('Report copied to clipboard.');
  const fail = () => {
    try {
      const ta = document.createElement('textarea');
      ta.value = text; ta.style.position = 'fixed'; ta.style.opacity = '0';
      document.body.appendChild(ta); ta.select();
      document.execCommand('copy');
      document.body.removeChild(ta);
      done();
    } catch (err) { toast('Could not copy automatically — select the report text and copy manually.'); }
  };
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text).then(done).catch(fail);
  } else fail();
}

/* ---------------------------------------------------------------
   13. EVENT DELEGATION
   --------------------------------------------------------------- */
document.addEventListener('click', function (e) {
  const el = e.target.closest('[data-action]');
  if (!el) return;
  const action = el.dataset.action;
  const idx = el.dataset.idx != null ? Number(el.dataset.idx) : null;

  switch (action) {
    case 'nav': goTo(el.dataset.screen); break;
    case 'open-evidence':
      state.evidence[el.dataset.id].visited = true;
      state.currentEvidence = el.dataset.id;
      resetUi(); saveState(); render();
      window.scrollTo({ top: 0, behavior: 'smooth' });
      break;
    case 'close-evidence': state.currentEvidence = null; resetUi(); saveState(); render(); break;

    case 'hotspot': ui.hotspot = (ui.hotspot === idx) ? null : idx; render(); break;
    case 'toggle-phrase': ui.highlight = ui.highlight || {}; ui.highlight[idx] = !ui.highlight[idx]; render(); break;
    case 'set-compare': ui.compareIdx = idx; render(); break;
    case 'toggle-reveal': ui.reveal = ui.reveal || {}; ui.reveal[idx] = !ui.reveal[idx]; render(); break;
    case 'toggle-tally-close': ui.tallyClosing = !ui.tallyClosing; render(); break;
    case 'toggle-myth': ui.myth = ui.myth || {}; ui.myth[idx] = !ui.myth[idx]; render(); break;
    case 'toggle-wc': ui.wordchoice = ui.wordchoice || {}; ui.wordchoice[idx] = !ui.wordchoice[idx]; render(); break;
    case 'toggle-lastwords': ui.lastwords = !ui.lastwords; render(); break;
    case 'mini-up': ui.miniorderOrder = moveInArray(ui.miniorderOrder, idx, -1); ui.miniorderChecked = false; render(); break;
    case 'mini-down': ui.miniorderOrder = moveInArray(ui.miniorderOrder, idx, 1); ui.miniorderChecked = false; render(); break;
    case 'mini-check': ui.miniorderChecked = true; render(); break;

    case 'set-reliability': currentEvidenceRec().reliability = el.dataset.level; saveState(); render(); break;
    case 'confirm-evidence': confirmEvidence(); break;

    case 'tl-up': state.timeline.order = moveInArray(state.timeline.order, idx, -1); state.timeline.checked = false; saveState(); render(); break;
    case 'tl-down': state.timeline.order = moveInArray(state.timeline.order, idx, 1); state.timeline.checked = false; saveState(); render(); break;
    case 'tl-check':
      state.timeline.checked = true;
      state.timeline.solved = state.timeline.order.every((id, i) => id === DATA.timelineEvents[i].id);
      saveState(); render();
      break;

    case 'matrix-set': state.matrix[el.dataset.suspect] = el.dataset.level; saveState(); render(); break;

    case 'arg-primary': state.argument.primary = el.dataset.suspect; saveState(); render(); break;
    case 'arg-confidence': state.argument.confidence = el.dataset.level; saveState(); render(); break;
    case 'arg-submit':
      state.argument.submitted = true; saveState(); render();
      toast('Argument submitted — historian interpretations unlocked.');
      break;

    case 'cmp-done':
      state.comparisons[el.dataset.id].done = !state.comparisons[el.dataset.id].done;
      saveState(); render();
      break;

    case 'open-notebook': ui.notebookOpen = true; render(); break;
    case 'close-notebook': ui.notebookOpen = false; render(); break;

    case 'teacher-open': ui.teacherOpen = true; render(); break;
    case 'teacher-close': ui.teacherOpen = false; render(); break;
    case 'teacher-backdrop': ui.teacherOpen = false; render(); break;
    case 'teacher-reset': teacherReset(); break;
    case 'teacher-print-packet': printBlankPacket(); break;

    case 'report-print': printReport(); break;
    case 'report-copy': copyReport(); break;
    case 'report-restart': restartInvestigation(); break;

    case 'font-set': state.fontSize = el.dataset.size; saveState(); render(); break;
    default: break;
  }
});

document.addEventListener('change', function (e) {
  const el = e.target.closest('[data-action]');
  if (!el) return;
  const action = el.dataset.action;
  if (action === 'toggle-suspect') {
    const rec = currentEvidenceRec();
    const sid = el.dataset.suspect;
    const at = rec.suspects.indexOf(sid);
    if (el.checked && at === -1) rec.suspects.push(sid);
    if (!el.checked && at > -1) rec.suspects.splice(at, 1);
    saveState(); render();
  } else if (action === 'arg-strongest-select') {
    state.argument.strongest[Number(el.dataset.idx)].evidenceId = el.value;
    saveState(); render();
  } else if (action === 'arg-contra-select') {
    state.argument.contradictoryId = el.value;
    saveState(); render();
  }
});

document.addEventListener('input', function (e) {
  const el = e.target.closest('[data-action]');
  if (!el) return;
  const action = el.dataset.action;
  if (action === 'note-input') {
    currentEvidenceRec()[el.dataset.field] = el.value;
    debouncedSave();
  } else if (action === 'cmp-input') {
    state.comparisons[el.dataset.id][el.dataset.field] = el.value;
    debouncedSave();
  } else if (action === 'reflect-input') {
    state.reflection[el.dataset.id] = el.value;
    debouncedSave();
  } else if (action === 'arg-strongest-reason') {
    state.argument.strongest[Number(el.dataset.idx)].reason = el.value;
    debouncedSave();
  } else if (action === 'arg-contra-reason') {
    state.argument.contradictoryReason = el.value;
    debouncedSave();
  } else if (action === 'slider-input') {
    const rec = currentEvidenceRec();
    rec.sliders[el.dataset.suspect] = Number(el.value);
    const out = el.parentElement.querySelector('output');
    if (out) out.textContent = (Number(el.value) >= 0 ? '+' : '') + el.value + '%';
    debouncedSave();
  }
});

/* Drag-and-drop reordering for timeline / mini-order widgets */
let dragState = null;
document.addEventListener('dragstart', function (e) {
  const li = e.target.closest('.order-item');
  if (!li) return;
  dragState = { group: li.dataset.dragGroup, id: li.dataset.id };
  if (e.dataTransfer) e.dataTransfer.effectAllowed = 'move';
});
document.addEventListener('dragover', function (e) {
  const li = e.target.closest('.order-item');
  if (!li || !dragState || li.dataset.dragGroup !== dragState.group) return;
  e.preventDefault();
});
document.addEventListener('drop', function (e) {
  const li = e.target.closest('.order-item');
  if (!li || !dragState || li.dataset.dragGroup !== dragState.group) return;
  e.preventDefault();
  const dropId = li.dataset.id;
  if (dragState.group === 'tl') {
    state.timeline.order = reorderByDrag(state.timeline.order, dragState.id, dropId);
    state.timeline.checked = false;
    saveState();
  } else if (dragState.group === 'mini') {
    ui.miniorderOrder = reorderByDrag(ui.miniorderOrder, dragState.id, dropId);
    ui.miniorderChecked = false;
  }
  dragState = null;
  render();
});

document.addEventListener('keydown', function (e) {
  if (e.ctrlKey && e.altKey && (e.key === 't' || e.key === 'T')) {
    ui.teacherOpen = !ui.teacherOpen; render(); e.preventDefault();
  } else if (e.key === 'Escape') {
    if (ui.teacherOpen) { ui.teacherOpen = false; render(); }
    if (ui.notebookOpen) { ui.notebookOpen = false; render(); }
  }
});

/* ---------------------------------------------------------------
   14. INIT
   --------------------------------------------------------------- */
render();
</script></body></html>
